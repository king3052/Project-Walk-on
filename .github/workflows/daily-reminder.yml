name: Daily reminder notifications

on:
  schedule:
    # 8pm UTC daily — adjust to your timezone as needed
    - cron: "0 20 * * *"
  workflow_dispatch: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/notifications/send-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail
